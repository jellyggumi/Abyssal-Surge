field_categories:
  - category: source
    fields:
      - name: source_url
        description: Direct authoritative source URL.
        detail_level: detailed
        required: true
      - name: source_type
        description: Publisher and source reliability class.
        detail_level: moderate
        required: true
  - category: evidence
    fields:
      - name: verified_claim
        description: Specific source-backed interface or interaction claim.
        detail_level: detailed
        required: true
      - name: applicability
        description: Universal principle versus title-specific convention.
        detail_level: moderate
        required: true
  - category: production
    fields:
      - name: battle_screen_implication
        description: Concrete tactical-screen decision for Abyssal Command.
        detail_level: detailed
        required: true
      - name: anti_pattern
        description: Design failure to avoid when applying the finding.
        detail_level: moderate
        required: true
      - name: acceptance_criterion
        description: Observable condition that proves the finding was applied.
        detail_level: detailed
        required: true
