# Static GitHub Pages publication with a committed allowlist and recovery revision gate.
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      rollback_revision:
        description: "Full 40-character commit SHA to publish for an authorized recovery rehearsal"
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      PAGES_ARTIFACT_DIR: .pages-artifact
      PAGES_REVISION: ${{ github.event_name == 'workflow_dispatch' && inputs.rollback_revision || github.sha }}
    steps:
      - name: Checkout requested committed revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.rollback_revision || github.sha }}
          fetch-depth: 0
      - name: Validate pinned recovery revision
        shell: bash
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] && ! printf '%s' "$PAGES_REVISION" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "rollback_revision must be a full lowercase 40-character commit SHA" >&2
            exit 1
          fi
          resolved="$(git rev-parse --verify "${PAGES_REVISION}^{commit}")"
          test "$resolved" = "$PAGES_REVISION"
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            git merge-base --is-ancestor "$PAGES_REVISION" origin/main
          fi
      - name: Guard committed static import closure
        shell: bash
        run: |
          set -euo pipefail
          for file in index.html app.js game-core.js campaign-state.js styles.css privacy.html sw.js manifest.json icon.svg; do
            git cat-file -e "${PAGES_REVISION}:${file}"
            test -f "$file"
          done
          node --check app.js
          node --check game-core.js
          node --check campaign-state.js
          node --check sw.js
          grep -Fq 'href="styles.css"' index.html
          grep -Fq '<script type="module" src="app.js"></script>' index.html
          grep -Fq 'from "./campaign-state.js";' app.js
      - name: Build allowlisted Pages artifact
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$PAGES_ARTIFACT_DIR"
          mkdir -p "$PAGES_ARTIFACT_DIR"
          git archive --format=tar "$PAGES_REVISION" -- index.html app.js game-core.js campaign-state.js styles.css privacy.html sw.js manifest.json icon.svg assets | tar -x -C "$PAGES_ARTIFACT_DIR"
          expected="$(git ls-tree -r --name-only "$PAGES_REVISION" -- index.html app.js game-core.js campaign-state.js styles.css privacy.html sw.js manifest.json icon.svg assets | sort)"
          actual="$(find "$PAGES_ARTIFACT_DIR" -type f -print | sed "s#^${PAGES_ARTIFACT_DIR}/##" | sort)"
          test "$actual" = "$expected"

      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload allowlisted artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.PAGES_ARTIFACT_DIR }}
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
