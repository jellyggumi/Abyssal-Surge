name: Defense survivor Pages release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      rollback_revision:
        description: Full lowercase 40-character rollback SHA
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  RULES_VERSION: defense-survivor-v1
  PAGES_ARTIFACT_DIR: .pages-artifact
  PAGES_RUNTIME_PATHS: >-
    index.html app.js defense-viewport.js defense-catalog.js defense-run-simulation.js campaign-state.js defense-storage.js
    battle-realtime-three.js battle-visualizer.js styles.css react-game-ui.css sw.js manifest.json icon.svg privacy.html
    assets/icons/icon-192.png assets/icons/icon-512.png

jobs:
  resolve_revision:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.revision.outputs.sha }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.rollback_revision || github.sha }}
          fetch-depth: 0
      - id: revision
        shell: bash
        env:
          CANDIDATE: ${{ github.event_name == 'workflow_dispatch' && inputs.rollback_revision || github.sha }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" = workflow_dispatch ] && ! [[ "$CANDIDATE" =~ ^[0-9a-f]{40}$ ]]; then
            echo "rollback_revision must be a full lowercase 40-character SHA" >&2
            exit 1
          fi
          sha="$(git rev-parse --verify "${CANDIDATE}^{commit}")"
          test "$sha" = "$CANDIDATE"
          if [ "$GITHUB_EVENT_NAME" = workflow_dispatch ]; then
            git merge-base --is-ancestor "$sha" origin/main
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          mkdir -p results
          printf '{"gate":"resolve_revision","sha":"%s","status":"passed"}\n' "$sha" > results/resolve_revision.json
      - if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: resolve-revision-results
          path: results
          if-no-files-found: warn

  engine_contract:
    needs: resolve_revision
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ needs.resolve_revision.outputs.sha }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.14.0
          cache: npm
      - shell: bash
        env:
          RESOLVED_SHA: ${{ needs.resolve_revision.outputs.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$RESOLVED_SHA"
          npm ci
          node --test tests/defense-run-simulation.test.mjs tests/defense-campaign-adapter.test.mjs tests/defense-renderer-contract.test.mjs tests/defense-asset-manifest.test.mjs tests/no-rts-closure.test.mjs
          mkdir -p results
          node scripts/run-defense-balance-sim.mjs --strict --output "results/defense-balance-$RESOLVED_SHA.json"
          printf '{"gate":"engine_contract","sha":"%s","status":"passed"}\n' "$RESOLVED_SHA" > results/engine_contract.json
      - if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: engine-contract-results
          path: results
          if-no-files-found: warn

  release_closure:
    needs: resolve_revision
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ needs.resolve_revision.outputs.sha }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.14.0
          cache: npm
      - shell: bash
        env:
          RESOLVED_SHA: ${{ needs.resolve_revision.outputs.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$RESOLVED_SHA"
          npm ci
          node --test tests/release-closure.test.mjs
          mkdir -p results
          printf '{"gate":"release_closure","sha":"%s","status":"passed"}\n' "$RESOLVED_SHA" > results/release_closure.json
      - if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: release-closure-results
          path: results
          if-no-files-found: warn

  browser_contract:
    needs: resolve_revision
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ needs.resolve_revision.outputs.sha }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.14.0
          cache: npm
      - shell: bash
        env:
          RESOLVED_SHA: ${{ needs.resolve_revision.outputs.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$RESOLVED_SHA"
          mkdir -p results
          npm ci
          npx --no-install playwright install --with-deps chromium
          node tests/defense-hud-responsive-browser.cjs > results/defense-hud-responsive-browser.json
          node tests/defense-survivor-browser.cjs > results/defense-survivor-browser.json
          node tests/defense-performance-browser.cjs > results/defense-performance-browser.json
          printf '{"gate":"browser_contract","sha":"%s","status":"passed"}\n' "$RESOLVED_SHA" > results/browser_contract.json
      - if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: browser-contract-results
          path: results
          if-no-files-found: warn

  package_pages:
    needs: [resolve_revision, engine_contract, release_closure, browser_contract]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ needs.resolve_revision.outputs.sha }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.14.0
          cache: npm
      - shell: bash
        env:
          RESOLVED_SHA: ${{ needs.resolve_revision.outputs.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$RESOLVED_SHA"
          rm -rf "$PAGES_ARTIFACT_DIR"
          mkdir -p "$PAGES_ARTIFACT_DIR" results
          read -r -a paths <<< "$PAGES_RUNTIME_PATHS"
          for path in "${paths[@]}"; do test -f "$path"; done
          git archive --format=tar "$RESOLVED_SHA" -- "${paths[@]}" | tar -x -C "$PAGES_ARTIFACT_DIR"
          actual="$(find "$PAGES_ARTIFACT_DIR" -type f -print | sed "s#^$PAGES_ARTIFACT_DIR/##" | sort)"
          expected="$(printf '%s\n' "${paths[@]}" | sort)"
          test "$actual" = "$expected"
          version="$(node scripts/read-defense-rules-version.mjs)"
          test "$version" = "$RULES_VERSION"
          printf '{"candidate_sha":"%s","rules_version":"%s"}\n' "$RESOLVED_SHA" "$RULES_VERSION" > "$PAGES_ARTIFACT_DIR/version.json"
          node scripts/validate-pages-version.mjs --file "$PAGES_ARTIFACT_DIR/version.json" --sha "$RESOLVED_SHA"
          printf '{"gate":"package_pages","sha":"%s","status":"passed"}\n' "$RESOLVED_SHA" > results/package_pages.json
      - if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: pages-bundle
          path: .pages-artifact
          if-no-files-found: warn
      - if: always()
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa
        with:
          path: .pages-artifact
      - if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: package-pages-results
          path: results
          if-no-files-found: warn

  artifact_smoke:
    needs: [resolve_revision, package_pages]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ needs.resolve_revision.outputs.sha }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.14.0
          cache: npm
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: pages-bundle
          path: .pages-artifact
      - shell: bash
        env:
          RESOLVED_SHA: ${{ needs.resolve_revision.outputs.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$RESOLVED_SHA"
          node -e 'const { createServer } = require("node:http"); const { readFile } = require("node:fs"); const { join, normalize } = require("node:path"); const root = process.argv[1]; createServer((request, response) => { const file = normalize(join(root, request.url === "/" ? "index.html" : request.url)); if (!file.startsWith(root)) return response.writeHead(403).end(); readFile(file, (error, body) => response.writeHead(error ? 404 : 200).end(error ? "not found" : body)); }).listen(4173);' "$PWD/.pages-artifact" &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          sleep 1
          node -e 'require("node:http").get("http://127.0.0.1:4173/", (response) => { if (response.statusCode !== 200) process.exitCode = 1; response.resume(); });'
          node tests/pages-artifact-smoke.cjs --dir .pages-artifact
          node scripts/validate-pages-version.mjs --file .pages-artifact/version.json --sha "$RESOLVED_SHA"
          mkdir -p results
          printf '{"gate":"artifact_smoke","sha":"%s","status":"passed"}\n' "$RESOLVED_SHA" > results/artifact_smoke.json
      - if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: artifact-smoke-results
          path: results
          if-no-files-found: warn

  deploy_pages:
    needs: [resolve_revision, artifact_smoke]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ needs.resolve_revision.outputs.sha }}
      - shell: bash
        env:
          RESOLVED_SHA: ${{ needs.resolve_revision.outputs.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$RESOLVED_SHA"
          mkdir -p results
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
      - if: always()
        shell: bash
        env:
          RESOLVED_SHA: ${{ needs.resolve_revision.outputs.sha }}
          DEPLOYMENT_OUTCOME: ${{ steps.deployment.outcome }}
        run: |
          mkdir -p results
          printf '{"gate":"deploy_pages","sha":"%s","status":"%s"}\n' "$RESOLVED_SHA" "$DEPLOYMENT_OUTCOME" > results/deploy_pages.json
      - if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: deploy-pages-results
          path: results
          if-no-files-found: warn

  deployed_smoke:
    if: needs.deploy_pages.result == 'success'
    needs: [resolve_revision, deploy_pages]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ needs.resolve_revision.outputs.sha }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.14.0
          cache: npm
      - shell: bash
        env:
          RESOLVED_SHA: ${{ needs.resolve_revision.outputs.sha }}
          PAGE_URL: ${{ needs.deploy_pages.outputs.page_url }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$RESOLVED_SHA"
          npm ci
          npx --no-install playwright install --with-deps chromium
          mkdir -p results
          if [ -f tests/deployed-defense-smoke.cjs ]; then
            node tests/deployed-defense-smoke.cjs --url "$PAGE_URL" --sha "$RESOLVED_SHA" --rules-version "$RULES_VERSION"
            status=passed
          else
            status=unsupported-no-deployed-defense-smoke
          fi
          printf '{"gate":"deployed_smoke","sha":"%s","status":"%s"}\n' "$RESOLVED_SHA" "$status" > results/deployed_smoke.json
          test "$status" = passed
      - if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: deployed-smoke-results
          path: results
          if-no-files-found: warn

  release_receipt:
    if: always()
    needs: [resolve_revision, engine_contract, release_closure, browser_contract, package_pages, artifact_smoke, deploy_pages, deployed_smoke]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ needs.resolve_revision.outputs.sha }}
      - shell: bash
        env:
          RESOLVED_SHA: ${{ needs.resolve_revision.outputs.sha }}
          ENGINE: ${{ needs.engine_contract.result }}
          CLOSURE: ${{ needs.release_closure.result }}
          BROWSER: ${{ needs.browser_contract.result }}
          PACKAGE: ${{ needs.package_pages.result }}
          ARTIFACT: ${{ needs.artifact_smoke.result }}
          DEPLOY: ${{ needs.deploy_pages.result }}
          DEPLOYED: ${{ needs.deployed_smoke.result }}
          PAGE_URL: ${{ needs.deploy_pages.outputs.page_url }}
        run: |
          set -euo pipefail
          test -n "$RESOLVED_SHA"
          test "$(git rev-parse HEAD)" = "$RESOLVED_SHA"
          mkdir -p results
          all_gate_pass=true
          for result in "$ENGINE" "$CLOSURE" "$BROWSER" "$PACKAGE" "$ARTIFACT" "$DEPLOY" "$DEPLOYED"; do
            if [ "$result" != success ]; then
              all_gate_pass=false
            fi
          done
          printf '{"gate":"release_receipt","sha":"%s","page_url":"%s","all_gate_pass":%s,"upstream":{"engine_contract":"%s","release_closure":"%s","browser_contract":"%s","package_pages":"%s","artifact_smoke":"%s","deploy_pages":"%s","deployed_smoke":"%s"}}\n' "$RESOLVED_SHA" "$PAGE_URL" "$all_gate_pass" "$ENGINE" "$CLOSURE" "$BROWSER" "$PACKAGE" "$ARTIFACT" "$DEPLOY" "$DEPLOYED" > results/release_receipt.json
          test "$all_gate_pass" = true
      - if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: release-receipt-results
          path: results
          if-no-files-found: warn
