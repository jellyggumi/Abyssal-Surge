<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="840" viewBox="0 0 1200 840" role="img" aria-labelledby="title desc">
  <title id="title">Abyssal Surge Runtime Flow (Current)</title>
  <desc id="desc">Input, deterministic core, presentation, and deployment flow for the current implementation.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2dd4bf" />
    </marker>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #e5e7eb; }
      .sub { font: 600 18px Arial, sans-serif; fill: #facc15; }
      .body { font: 400 16px Arial, sans-serif; fill: #e5e7eb; }
      .box { fill: #0f172a; stroke: #22d3ee; stroke-width: 2; rx: 14; }
      .boxMuted { fill: #111827; stroke: #94a3b8; stroke-width: 1.5; rx: 12; }
      .boxWarn { fill: #1f2937; stroke: #f59e0b; stroke-width: 1.5; rx: 12; }
      .line { fill: none; stroke: #22d3ee; stroke-width: 3; marker-end: url(#arrow); }
      .lineWarn { fill: none; stroke: #f472b6; stroke-width: 2.25; stroke-dasharray: 6 6; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="840" fill="#020617"/>

  <text x="36" y="60" class="title">Abyssal Surge Runtime / Data Pipeline</text>
  <text x="36" y="92" class="body">Current implementation: Stage 1 loop + 5-encounter campaign scaffold</text>

  <!-- Top layer: input -->
  <rect x="60" y="130" width="260" height="120" class="box"/>
  <text x="190" y="175" text-anchor="middle" class="sub">Player Input</text>
  <text x="190" y="203" text-anchor="middle" class="body">Keyboard: S,B,D,R</text>
  <text x="190" y="225" text-anchor="middle" class="body">Buttons + Battlefield Click</text>

  <rect x="350" y="130" width="300" height="120" class="box"/>
  <text x="500" y="175" text-anchor="middle" class="sub">app.js Event Router</text>
  <text x="500" y="203" text-anchor="middle" class="body">recordCommand()</text>
  <text x="500" y="225" text-anchor="middle" class="body">commandAvailable() + sequence</text>

  <rect x="700" y="130" width="260" height="120" class="box"/>
  <text x="830" y="175" text-anchor="middle" class="sub">Deterministic Core</text>
  <text x="830" y="203" text-anchor="middle" class="body">game-core.js</text>
  <text x="830" y="225" text-anchor="middle" class="body">makeCommand → reduceEncounter</text>

  <rect x="1000" y="130" width="160" height="120" class="box"/>
  <text x="1080" y="175" text-anchor="middle" class="sub">State</text>
  <text x="1080" y="203" text-anchor="middle" class="body">focus, integrity</text>
  <text x="1080" y="225" text-anchor="middle" class="body">guard, pressure, foe_health</text>

  <!-- arrows -->
  <path d="M320 190 L350 190" class="line"/>
  <path d="M650 190 L700 190" class="line"/>
  <path d="M960 190 L1000 190" class="line"/>

  <!-- middle layer -->
  <rect x="60" y="320" width="260" height="170" class="boxMuted"/>
  <text x="190" y="365" text-anchor="middle" class="sub">Replay/Integrity Checks</text>
  <text x="190" y="395" text-anchor="middle" class="body">validateDeterministicReplay</text>
  <text x="190" y="417" text-anchor="middle" class="body">settleCampaign</text>
  <text x="190" y="439" text-anchor="middle" class="body">awardFor(HOLD: 0, VICTORY:2)</text>

  <rect x="350" y="320" width="350" height="170" class="box"/>
  <text x="525" y="360" text-anchor="middle" class="sub">UI Rendering Layer</text>
  <text x="525" y="388" text-anchor="middle" class="body">HUD &amp; Metrics</text>
  <text x="525" y="410" text-anchor="middle" class="body">Tactical monitor, trace, narration</text>
  <text x="525" y="432" text-anchor="middle" class="body">Stage title + bilingual labels</text>

  <rect x="740" y="320" width="250" height="170" class="box"/>
  <text x="865" y="360" text-anchor="middle" class="sub">Presentation Runtime</text>
  <text x="865" y="388" text-anchor="middle" class="body">requestAnimationFrame</text>
  <text x="865" y="410" text-anchor="middle" class="body">Unit spawn/motion (cosmetic)</text>
  <text x="865" y="432" text-anchor="middle" class="body">Cinematic overlay + typing FX</text>

  <rect x="1020" y="320" width="140" height="170" class="boxWarn"/>
  <text x="1090" y="360" text-anchor="middle" class="sub">Audio</text>
  <text x="1090" y="388" text-anchor="middle" class="body">bgm/sfx/narration</text>
  <text x="1090" y="410" text-anchor="middle" class="body">11Labs assets</text>
  <text x="1090" y="432" text-anchor="middle" class="body">per-command trigger</text>

  <path d="M190 250 L190 320" class="lineWarn"/>
  <path d="M525 300 L525 320" class="line"/>
  <path d="M830 250 L865 320" class="line"/>
  <path d="M1090 300 L1090 320" class="lineWarn"/>

  <!-- Bottom layer -->
  <rect x="120" y="560" width="440" height="210" class="boxMuted"/>
  <text x="340" y="605" text-anchor="middle" class="sub">Campaign Settlement</text>
  <text x="340" y="635" text-anchor="middle" class="body">Encounters 1~5 = campaign progression</text>
  <text x="340" y="657" text-anchor="middle" class="body">Terminal outcomes drive resolve mark conversion</text>
  <text x="340" y="679" text-anchor="middle" class="body">3 fragments -> 1 resolve mark (max 2)</text>

  <rect x="640" y="560" width="430" height="210" class="box"/>
  <text x="855" y="605" text-anchor="middle" class="sub">Static Difficulty Profiles (Stages 1–5)</text>
  <text x="855" y="629" text-anchor="middle" class="body">I / Focus / Foe HP / start Pressure</text>
  <text x="855" y="651" text-anchor="middle" class="body">S1: 6/3/6 / 0</text>
  <text x="855" y="673" text-anchor="middle" class="body">S2: 6/3/8 / 0</text>
  <text x="855" y="695" text-anchor="middle" class="body">S3: 8/4/10 / 0</text>
  <text x="855" y="717" text-anchor="middle" class="body">S4: 6/3/12 / 1</text>
  <text x="855" y="739" text-anchor="middle" class="body">S5: 6/4/5 / 0 (SURGE-only disrupt cost escalates: 1→2→3…)</text>

  <!-- deploy and roadmap boxes -->
  <rect x="220" y="785" width="320" height="35" fill="#111827" stroke="#22d3ee" stroke-width="1.5" rx="10"/>
  <text x="380" y="808" text-anchor="middle" class="body">GitHub Pages allowlist artifact: index/app/game-core/styles/privacy/sw/manifest/icon + assets</text>

  <rect x="650" y="785" width="430" height="35" fill="#1f2937" stroke="#f59e0b" stroke-width="1.5" rx="10"/>
  <text x="865" y="808" text-anchor="middle" class="body">Roadmap(Design target): Scout/Mark/Coordinate/Recover + explicit command mode state machine</text>

  <!-- connectors down -->
  <path d="M190 560 C190 590, 340 590, 340 560" class="line"/>
  <path d="M525 490 L525 560" class="line"/>
  <path d="M865 490 L855 560" class="line"/>
  <path d="M1080 490 L1090 560" class="line"/>

  <path d="M380 790 L360 560" class="lineWarn"/>
  <path d="M865 790 L865 770" class="lineWarn"/>
</svg>