<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640" role="img" aria-labelledby="title desc">
  <title id="title">Abyssal Surge 제작 루프(기획-구현-테스트-PM)</title>
  <desc id="desc">현재 게임의 작업 흐름: Stage 1에서 시작한 반복적 개선 루프를 통해 5단계 스테이지를 이어서 구축</desc>
  <defs>
    <style>
      .title { fill: #e2e8f0; font-size: 26px; font-family: Inter, Arial, sans-serif; font-weight: 700; }
      .subtitle { fill: #cbd5e1; font-size: 16px; font-family: Inter, Arial, sans-serif; }
      .card { fill: #0f172a; stroke: #22d3ee; stroke-width: 2; rx: 14; }
      .card2 { fill: #0f1a2f; stroke: #f59e0b; stroke-width: 2; rx: 14; }
      .label { fill: #e2e8f0; font-size: 18px; font-family: Inter, Arial, sans-serif; font-weight: 700; }
      .body { fill: #cbd5e1; font-size: 14px; font-family: Inter, Arial, sans-serif; }
      .flow { stroke: #22d3ee; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .muted { stroke: #64748b; stroke-width: 2; fill: none; }
      .small { font-size: 12px; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 L4,6 z" fill="#22d3ee" />
    </marker>
  </defs>

  <rect width="960" height="640" fill="#020617" />
  <text x="40" y="50" class="title">Abyssal Surge 제작 루프</text>
  <text x="40" y="78" class="subtitle">기획(Concept) → 구현(Implement) → 테스트(Test) → PM 정리 → 다음 반복 (총 5스테이지로 확장)</text>

  <rect class="card" x="60" y="120" width="170" height="110"/>
  <text x="145" y="160" class="label" text-anchor="middle">기획 &amp; 밸런스</text>
  <text x="145" y="183" class="body" text-anchor="middle">연구/벤치마크</text>
  <text x="145" y="205" class="body" text-anchor="middle">시나리오 정렬</text>

  <rect class="card2" x="280" y="120" width="170" height="110"/>
  <text x="365" y="160" class="label" text-anchor="middle">구현</text>
  <text x="365" y="183" class="body" text-anchor="middle">app.js / game-core.js</text>
  <text x="365" y="205" class="body" text-anchor="middle">사운드·영상·자원 연계</text>

  <rect class="card" x="500" y="120" width="170" height="110"/>
  <text x="585" y="160" class="label" text-anchor="middle">테스트</text>
  <text x="585" y="183" class="body" text-anchor="middle">unit + playtest</text>
  <text x="585" y="205" class="body" text-anchor="middle">회귀 + 리그레션</text>

  <rect class="card2" x="720" y="120" width="170" height="110"/>
  <text x="805" y="160" class="label" text-anchor="middle">PM 정리</text>
  <text x="805" y="183" class="body" text-anchor="middle">리드미/의사결정 기록</text>
  <text x="805" y="205" class="body" text-anchor="middle">다음 사이클 정의</text>

  <path class="flow" d="M230 175 L280 175" />
  <path class="flow" d="M450 175 L500 175" />
  <path class="flow" d="M670 175 L720 175" />
  <path class="flow muted" d="M805 230 L805 285 L145 285 L145 230 Z" />
  <text x="600" y="300" class="body" text-anchor="middle">1사이클마다 피드백 수렴 후 Stage 1 완료 조건 만족 시 Stage N+1로 진행</text>

  <rect x="80" y="340" width="800" height="240" fill="#0b1222" stroke="#334155" stroke-width="2" rx="16"/>
  <text x="480" y="378" class="label" text-anchor="middle">캠페인 스테이지 진행</text>
  <text x="480" y="405" class="body" text-anchor="middle">Stage 1 → Stage 2 → Stage 3 → Stage 4 → Stage 5</text>

  <rect x="130" y="430" width="130" height="90" class="card2"/>
  <text x="195" y="470" class="label" text-anchor="middle" font-size="17">Stage 1</text>
  <text x="195" y="490" class="body" text-anchor="middle">베이스 규칙 정합</text>

  <rect x="290" y="430" width="130" height="90" class="card"/>
  <text x="355" y="470" class="label" text-anchor="middle" font-size="17">Stage 2</text>
  <text x="355" y="490" class="body" text-anchor="middle">난이도/리듬 확장</text>

  <rect x="450" y="430" width="130" height="90" class="card2"/>
  <text x="515" y="470" class="label" text-anchor="middle" font-size="17">Stage 3</text>
  <text x="515" y="490" class="body" text-anchor="middle">연출/자원 심화</text>

  <rect x="610" y="430" width="130" height="90" class="card"/>
  <text x="675" y="470" class="label" text-anchor="middle" font-size="17">Stage 4</text>
  <text x="675" y="490" class="body" text-anchor="middle">시퀀스 연동</text>

  <rect x="750" y="430" width="130" height="90" class="card2"/>
  <text x="815" y="470" class="label" text-anchor="middle" font-size="17">Stage 5</text>
  <text x="815" y="490" class="body" text-anchor="middle">캠페인 결산</text>
  <path class="flow" d="M260 475 L290 475" />
  <path class="flow" d="M420 475 L450 475" />
  <path class="flow" d="M580 475 L610 475" />
  <path class="flow" d="M740 475 L750 475" />
  <path class="flow muted" d="M815 520 L815 560 L195 560 L195 520" />

  <text x="480" y="595" class="small" fill="#94a3b8" text-anchor="middle">완료 조건: 캠페인 5스테이지가 연결되고 다음 게임 파트(다음 단계)로 이어지는 상태에서 PM 사이클 종료</text>
</svg>
